const { useState, useEffect, useCallback, useRef } = React;
const mkSet    = (...args) => new Set(...args);

const WS = {نشط:{bg:"#dcfce7",text:"#15803d",border:"#86efac"},إجازة:{bg:"#fef9c3",text:"#a16207",border:"#fde047"}};
const today  = () => mkDate().toISOString().split("T")[0];
const isFri  = d  => mkDate(d).getDay() === 5;
const wage   = m  => m / 26;
const fmtKWD = n  => Number(n).toLocaleString("ar-KW",{minimumFractionDigits:3,maximumFractionDigits:3});
function addWD(dateStr, days) {
  let d = mkDate(dateStr), a = 0;
  while (a < days) { d.setDate(d.getDate()+1); if (d.getDay()!==5) a++; }
  return d.toISOString().split("T")[0];
}
function countWD(s, e) {
  let d = mkDate(s), c = 0, en = mkDate(e);
  while (d < en) { if (d.getDay()!==5) c++; d.setDate(d.getDate()+1); }
  return Math.max(0, c);
}
function daysLeft(dd) { return dd ? countWD(today(), dd) : 999; }
function overall(p)   { return Math.round(((p.completedStages||[]).length / STAGES.length)*100); }
function stageSched(startDate, deliveryDays) {
  const n = STAGES.length, per = Math.floor(deliveryDays/n), rem = deliveryDays%n;
  let cur = startDate;
  return STAGES.map((name,i) => {
    const days = Math.max(1, per + (i < rem ? 1 : 0));
    const start = cur, end = addWD(cur, days);
    cur = end;
    return {name, icon:ICONS[i], days, startDate:start, endDate:end};
  });
}
function schedWithOv(startDate, deliveryDays, ov={}) {
  const n = STAGES.length, per = Math.floor(deliveryDays/n), rem = deliveryDays%n;
  let cur = startDate;
  return STAGES.map((name,i) => {
    const days = ov[i] !== undefined ? ov[i] : Math.max(1, per + (i<rem?1:0));
    const start = cur, end = addWD(cur, days);
    cur = end;
    return {name, icon:ICONS[i], days, startDate:start, endDate:end};
  });
}
function stageDelay(endDate, isDone) {
  if (isDone || !endDate) return 0;
  const now = mkDate(), e = mkDate(endDate);
  if (now <= e) return 0;
  return Math.min(100, countWD(endDate, today())*10);
}
function applyCarryover(project, idx) {
  const sched = schedWithOv(project.startDate, project.deliveryDays||30, project.stageOverrides||{});
  const stg   = sched[idx];
  const actual = Math.max(1, countWD(stg.startDate, today()));
  const saved  = Math.max(0, stg.days - actual);
  const newOv  = {...(project.stageOverrides||{}), [idx]: actual};
  if (saved > 0) {
    const future = sched.map((_,i)=>i).filter(i => i>idx && newOv[i]===undefined);
    if (future.length > 0) {
      const ex = Math.floor(saved/future.length), er = saved%future.length;
      future.forEach((si,j) => { newOv[si] = sched[si].days + ex + (j<er?1:0); });
    }
  }
  return {newOv, saved};
}
function splitCount(workerId, date, logs) {
  const uniqueProjects = mkSet(
    logs
      .filter(l => l.date===date && l.workers.some(w => w.workerId===workerId))
      .map(l => l.projectId)
  );
  return Math.max(1, uniqueProjects.size);
}
function projCosts(pid, logs) {
  const pl = (logs||[]).filter(l => l.projectId===pid);
  const counted = mkSet();
  let total = 0;
  pl.forEach(log => {
    log.workers.forEach(w => {
      const key = w.workerId + "_" + log.date;
      if (counted.has(key)) return;
      counted.add(key);
      const sc = splitCount(w.workerId, log.date, logs);
      total += (w.dailyWage * (log.isFriday?1.5:1)) / sc;
    });
  });
  const workerDays = mkSet();
  pl.forEach(log => log.workers.forEach(w => workerDays.add(w.workerId+"_"+log.date)));
  return {total, wDays:workerDays.size,
    unique:[...mkSet(pl.flatMap(l=>l.workers.map(w=>w.workerId)))].length,
    logs:[...pl].sort((a,b)=>b.date.localeCompare(a.date))};
}
function stageWorkers(stageIdx, project, logs) {
  const pl = (logs||[]).filter(l => l.projectId===project.id && l.stageIdx===stageIdx);
  const counted = mkSet();
  const map = {};
  pl.forEach(log => {
    log.workers.forEach(w => {
      const key = w.workerId + "_" + log.date;
      if (!map[w.workerId]) map[w.workerId] = {name:w.workerName, prof:w.profession||"—", days:0, cost:0, shared:false};
      if (!counted.has(key)) {
        counted.add(key);
        const sc = splitCount(w.workerId, log.date, logs);
        map[w.workerId].days += 1;
        map[w.workerId].cost += (w.dailyWage*(log.isFriday?1.5:1))/sc;
        if (sc > 1) map[w.workerId].shared = true;
      }
    });
  });
  return Object.values(map);
}
function exportCSV(project, logs, currency) {
  const c = projCosts(project.id, logs);
  const rows = [
    [`مشروع: #${project.number} — ${project.name||project.region}`],
    ["المنطقة:", project.region, "العميل:", project.client||"—"],
    ["مسؤول المبيعات:", project.salesRep||"—", "تاريخ التسليم:", project.deliveryDate||"—"],
    [`إجمالي التكلفة: ${fmtKWD(c.total)} ${currency}`],
    [],
    ["التاريخ","المرحلة","أسماء العمال","عدد العمال",`التكلفة (${currency})`],
  ];
  c.logs.forEach(log => {
    let dayCost = 0;
    log.workers.forEach(w => {
      const sc = splitCount(w.workerId, log.date, logs);
      dayCost += (w.dailyWage*(log.isFriday?1.5:1))/sc;
    });
    rows.push([
      log.date+(log.isFriday?" (جمعة)":""),
      log.stageIdx!==undefined ? STAGES[log.stageIdx] : "—",
      log.workers.map(w=>w.workerName).join(" / "),
      log.workers.length,
      fmtKWD(dayCost),
    ]);
  });
  rows.push([], ["","","","الإجمالي:", fmtKWD(c.total)+" "+currency]);
  const BOM = "\uFEFF";
  const csv = BOM + rows.map(r => r.map(cell => `"${String(cell||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = mkBlob([csv], {type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `مشروع_${project.number}.csv`; a.click();
  URL.revokeObjectURL(url);
}

      <text x={size/2} y={size/2+4} textAnchor="middle" fontSize={size*.21} fontWeight="700" fill="#1e293b" fontFamily="'Cairo',sans-serif">{value}%</text>
    </svg>
  );
}

}

function ProjectDetail({project, logs, role, onBack, onEdit, onDelete, onLog, setProjects, setToast}) {
  const [stCf, setStCf] = useState(null);
  const ov = overall(project);
  const c  = projCosts(project.id, logs);
  const cs = project.currentStage || 0;
  const sc = schedWithOv(project.startDate, project.deliveryDays||30, project.stageOverrides||{});
  const delayed = sc.filter((s,i) => !(project.completedStages||[]).includes(i) && stageDelay(s.endDate,false)>0 && i<=cs);
  function advance() {
    const isLast = cs >= STAGES.length-1;
    const {newOv, saved} = applyCarryover(project, cs);
    setProjects(prev => prev.map(p => p.id!==project.id ? p : {
      ...p,
      currentStage: isLast ? cs : cs+1,
      completedStages: [...(p.completedStages||[]), cs],
      stageCompletedDates: {...(p.stageCompletedDates||{}), [cs]:today()},
      stageOverrides: newOv,
      status: isLast ? "مكتمل" : p.status,
    }));
    setToast(isLast?"🏁 اكتمل المشروع!":saved>0?`✅ انتقل للتالية — ⚡ وُفِّر ${saved} يوم`:"✅ انتقل للمرحلة التالية");
    setStCf(null);
  }
  function revert() {
    if (!cs) return;
    const ps = cs-1;
    const nc = (project.completedStages||[]).filter(s => s!==ps);
    const nd = {...(project.stageCompletedDates||{})}; delete nd[ps];
    const no = {...(project.stageOverrides||{})}; for(let i=ps;i<STAGES.length;i++) delete no[i];
    setProjects(prev => prev.map(p => p.id!==project.id ? p : {...p,currentStage:ps,completedStages:nc,stageCompletedDates:nd,stageOverrides:no,status:"نشط"}));
    setToast("↩️ تم الرجوع للمرحلة السابقة");
    setStCf(null);
  }

function ReportsPage({workers, logs, absences, projects, settings}) {
  const filtLogs = logs.filter(l => l.isFriday);

  filtLogs.forEach(log => {
    log.workers.forEach(w => {
      const wd = workers.find(x => x.id===w.workerId);
      const cw = wd ? wage(wd.salary) : w.dailyWage;
      if (!overtimeMap[w.workerId]) overtimeMap[w.workerId] = {name:w.workerName, prof:w.profession||"—", days:[], total:0};
      if (!overtimeMap[w.workerId].days.includes(log.date)) {
        overtimeMap[w.workerId].days.push(log.date);
        overtimeMap[w.workerId].total += cw * 1.5;

  const absMap = {};
  absences.forEach(a => {

        ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
        @keyframes glow{0%,100%{box-shadow:0 0 0 3px rgba(30,64,175,.12)}50%{box-shadow:0 0 0 7px rgba(30,64,175,.2)}}
        input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;background:#e2e8f0}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:${settings.color};cursor:pointer}
        @media print{
          body{direction:rtl!important;font-family:'Cairo',sans-serif!important;}
          nav,button,[role=navigation]{display:none!important;}
          div[style*="position:fixed"]{display:none!important;}
          div[style*="paddingBottom:74"]{padding-bottom:0!important;}
          .no-print{display:none!important;}
        }
      `}</style>
      {/* Top Bar */}
 <div style={{background:settings.color,color:"white",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,.15)"}}>
 <div style={{display:"flex",alignItems:"center",gap:10}}>
          {page==="detail" && (
 <button onClick={() => { setPage("projects"); setDetailId(null); }} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"6px 10px",color:"white",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>←</button>
          )}
          {settings.logo
 ? <img src={settings.logo} alt="" style={{width:32,height:32,borderRadius:8,objectFit:"contain",background:"white"}}/>
 : <span style={{fontSize:22}}>{settings.emoji}</span>
          }
          <div>
 <div style={{fontSize:14,fontWeight:800,lineHeight:1.1}}>{settings.name}</div>
 <div style={{fontSize:10,opacity:.8}}>{ROLES[role]?.icon} {session.name}</div>
          </div>
        </div>
 <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {can(role,"addProject") && (
 <button onClick={() => setProjForm("new")} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"7px 12px",color:"white",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>+ مشروع</button>
          )}
 <button onClick={() => { setSession(null); setPage("home"); setDetailId(null); }} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,padding:"7px 10px",color:"white",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>خروج</button>
        </div>
      </div>
      {/* Content */}
 <div style={{padding:"16px 14px",maxWidth:680,margin:"0 auto"}}>
        {page==="home"     && <HomePage     projects={projects} workers={workers} logs={logs} settings={settings} role={role} onNav={setPage} onView={viewProj}/>}
        {page==="projects" && <ProjectsPage projects={projects} logs={logs} role={role} onAdd={() => setProjForm("new")} onEdit={p => setProjForm(p)} onDelete={deleteProject} onView={viewProj} onLog={p => setLogProj(p)}/>}
        {page==="detail"   && curProj && <ProjectDetail project={curProj} logs={logs} role={role} onBack={() => { setPage("projects"); setDetailId(null); }} onEdit={p => setProjForm(p)} onDelete={deleteProject} onLog={p => setLogProj(p)} setProjects={setProjects} setToast={setToast}/>}
        {page==="workers"  && can(role,"viewWorkers")  && <WorkersPage  workers={workers} logs={logs} onSave={w => { setWorkers(w); setToast("✅ تم حفظ بيانات الموظفين"); }}/>}
        {page==="absence"  && can(role,"logAbsence")   && <AbsencePage  workers={workers} absences={absences} onSave={(date,newAbs) => {
          setAbsences(prev => [...prev.filter(a => a.date!==date), ...newAbs]);
          setToast(`✅ تم حفظ غياب ${newAbs.length} موظف`);
        }}/>}
        {page==="costs"    && can(role,"viewCosts")    && <CostsPage    projects={projects} workers={workers} logs={logs} settings={settings} role={role} onLog={p => setLogProj(p)} onExport={p => exportCSV(p,logs,settings.cur)}/>}
        {page==="reports"  && can(role,"viewReports")  && <ReportsPage  workers={workers} logs={logs} absences={absences} projects={projects} settings={settings}/>}
        {page==="users"    && can(role,"viewSettings") && <UsersPage    users={users} onSave={u => { setUsers(u); setToast("✅ تم حفظ المستخدمين"); }}/>}
        {page==="settings" && can(role,"viewSettings") && <SettingsPage settings={settings} onSave={s => { setSettings(s); setToast("✅ تم حفظ الإعدادات"); }}/>}
      </div>
      {/* Bottom Nav */}
 <div style={{position:"fixed",bottom:0,right:0,left:0,background:"white",borderTop:"1px solid #e2e8f0",display:"flex",zIndex:100,boxShadow:"0 -2px 12px rgba(0,0,0,.06)"}}>
        {visNavs.map(n => {
          const active = (page===n.id) || (n.id==="projects" && page==="detail");
          return (
            <button key={n.id} onClick={() => { setPage(n.id); if (n.id!=="projects") setDetailId(null); }}
 style={{flex:1,padding:"10px 4px 8px",border:"none",background:"transparent",cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:`2px solid ${active?settings.color:"transparent"}`,transition:"all .15s"}}>
 <span style={{fontSize:20}}>{n.icon}</span>
 <span style={{fontSize:10,fontWeight:active?700:500,color:active?settings.color:"#94a3b8"}}>{n.label}</span>
            </button>
          );
        })}
      </div>
      {/* Modals */}
      {projForm  && <ProjForm project={projForm==="new"?null:projForm} role={role} onSave={saveProject} onClose={() => setProjForm(null)}/>}
      {logProj   && <LogForm  project={logProj} workers={workers} logs={logs} currentStage={logProj.currentStage||0} role={role} onSave={saveLog} onClose={() => setLogProj(null)}/>}
      {delCf     && <Confirm  icon="🗑" title="تأكيد الحذف" body={delCf.title} okLabel="نعم، احذف" okCol="red" onOk={delCf.onOk} onCancel={() => setDelCf(null)}/>}
      {toast     && <Toast    msg={toast} onDone={() => setToast(null)}/>}
    </div>
  );
}
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
